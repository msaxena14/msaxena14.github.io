<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Madhavam Saxena | Interactive SRE Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&display=swap');

        :root {
            --bg-color: #090b10;
            --term-bg: #11151c;
            --text-main: #a9b7c6;
            --green: #4ade80;
            --blue: #60a5fa;
            --yellow: #fbbf24;
            --red: #f87171;
            --comment: #6b7280;
            --glow: 0 0 4px rgba(74, 222, 128, 0.2);
        }

        body {
            font-family: 'Fira Code', monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; /* Handles mobile URL bar retracting */
            overflow: hidden;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        .terminal-window {
            width: 100%;
            max-width: 1000px;
            background: var(--term-bg);
            border: 1px solid #1f2937;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 2px rgba(255,255,255,0.1);
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            height: 85dvh;
        }

        .terminal-header {
            background: #0d1117;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1f2937;
            user-select: none;
        }

        .mac-buttons { display: flex; }
        .mac-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            opacity: 0.8;
        }
        .close { background: #ff5f56; }
        .min { background: #ffbd2e; }
        .max { background: #27c93f; }

        .terminal-title {
            color: var(--comment);
            font-size: 0.85rem;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0 10px;
        }
        
        .pdf-link {
            color: var(--blue);
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid var(--blue);
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .terminal-body {
            padding: 24px;
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            word-wrap: break-word;
            cursor: text;
        }

        .terminal-body::-webkit-scrollbar { width: 6px; }
        .terminal-body::-webkit-scrollbar-track { background: var(--term-bg); }
        .terminal-body::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

        .output-line { margin-bottom: 15px; }
        .user { color: var(--green); font-weight: 600; text-shadow: var(--glow); }
        .host { color: var(--blue); font-weight: 600; }
        .path { color: var(--yellow); font-weight: 600; }
        
        .highlight { color: var(--blue); }
        .success { color: var(--green); }
        .warning { color: var(--yellow); }
        .error { color: var(--red); }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap; /* Allows stacking on mobile */
        }

        .prompt-text {
            white-space: nowrap;
            margin-right: 8px;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: #f8fafc;
            font-family: 'Fira Code', monospace;
            font-size: 16px; /* Crucial: Prevents iOS from auto-zooming */
            flex-grow: 1;
            outline: none;
            caret-color: var(--green);
            min-width: 150px;
        }

        ul { margin: 5px 0 15px 0; padding-left: 20px; }
        li { margin-bottom: 8px; color: #d1d5db; }
        
        .mobile-tap-hint {
            display: none;
            color: var(--comment);
            font-style: italic;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        /* Mobile specific media queries */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .terminal-window { height: calc(100dvh - 20px); border-radius: 8px; }
            .terminal-body { padding: 15px; font-size: 0.9rem; }
            
            /* Stack the prompt and input to give more typing space on narrow screens */
            .prompt-text { display: block; margin-bottom: 4px; width: 100%; }
            .input-line { flex-direction: column; align-items: flex-start; }
            #cmd-input { width: 100%; }
            
            .terminal-header { padding: 10px; }
            .mac-buttons { display: none; } /* Hide mac dots to save space for title/link */
            
            .mobile-tap-hint { display: block; animation: pulse 2s infinite; }
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="terminal-header">
        <div class="mac-buttons">
            <div class="mac-btn close"></div>
            <div class="mac-btn min"></div>
            <div class="mac-btn max"></div>
        </div>
        <div class="terminal-title">admin@sre-prod-server:~</div>
        <a href="MadhavamSaxena_Resume.pdf" class="pdf-link" target="_blank">GUI Mode (PDF)</a>
    </div>
    
    <div class="terminal-body" id="term-body">
        
        <div class="output-line" style="color: var(--comment);">
            Last login: Sun Jun 28 18:20:25 on ttys001<br>
            [ OK ] System initialized.<br>
            <br>
            Welcome to Madhavam's Interactive Resume.<br>
            BUILT IN SILENCE. CONQUER IN PUBLIC.<br>
            <br>
            Type <span class="highlight">'help'</span> to see a list of available commands.
            <div class="mobile-tap-hint">[ Tap anywhere to start typing ]</div>
        </div>

        <div id="output-history"></div>

        <div class="input-line">
            <span class="prompt-text"><span class="user">admin</span>@<span class="host">sre-prod-server</span>:<span class="path">~</span>$</span>
            <!-- Removed autofocus so mobile keyboards don't instantly pop up and ruin the layout -->
            <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none">
        </div>

    </div>
</div>

<script>
    const inputField = document.getElementById('cmd-input');
    const historyDiv = document.getElementById('output-history');
    const termBody = document.getElementById('term-body');

    // Ensure tapping anywhere in the terminal body focuses the input
    termBody.addEventListener('click', function() {
        inputField.focus();
    });

    // Data Structure for the Resume
    const resumeData = {
        whoami: `
            <h2 style="margin: 0 0 10px 0; color: var(--green); text-shadow: var(--glow);">Madhavam Saxena</h2>
            <p><strong>Role:</strong> <span class="highlight">DEVOPS ENGINEER</span></p>
            <p><strong>Location:</strong> Beniganj, Ayodhya (224001)</p>
            <p><strong>Contact:</strong> +91-6386695044 | madhavamsaxena14@gmail.com</p>
            <p>DevOps Engineer with 3+ years of experience specialising in cloud infrastructure, containerisation, and automation.</p>
        `,
        skills: `
            <div style="margin-bottom: 15px;">
                <p><strong><span class="highlight">Orchestration:</span></strong> Docker, Kubernetes</p>
                <p><strong><span class="highlight">IaC & Config:</span></strong> Ansible, Terraform</p>
                <p><strong><span class="highlight">Cloud (AWS):</span></strong> EC2, S3, Lambda, VPC, IAM, EKS, CloudWatch, Boto3</p>
                <p><strong><span class="highlight">Observability:</span></strong> ELK Stack, OpenSearch, Prometheus, Grafana</p>
                <p><strong><span class="highlight">CI/CD & Sec:</span></strong> Jenkins, Vault, AWS Secret Manager</p>
                <p><strong><span class="highlight">Programming:</span></strong> Python, Shell Scripting</p>
            </div>
        `,
        experience: `
            <p><span class="success">●</span> <strong>DevOps Engineer @ Zupee</strong> <span class="warning">(Aug 2025 - Present)</span></p>
            <ul>
                <li>Automated AWS resource management via comprehensive tagging strategy.</li>
                <li>Managed multi-environment Kubernetes clusters (k8s-game-stage) across 5+ namespaces.</li>
                <li>Onboarded 17+ microservices to Astro / Reels platform.</li>
            </ul>
            <p><span class="success">●</span> <strong>Site Reliability Engineer-II @ Monotype Solutions</strong> <span class="warning">(Aug 2024 - Jul 2025)</span></p>
            <ul>
                <li>Engineered log management using ELK stack, saving 5% disk space.</li>
                <li>Diagnosed/resolved high latency from 72ms to 40ms.</li>
                <li>Achieved $22K annual savings by optimizing CloudTrail logs.</li>
            </ul>
            <p><span class="success">●</span> <strong>DevOps Engineer @ Paytm</strong> <span class="warning">(Nov 2021 - Jul 2024)</span></p>
            <ul>
                <li>Provisioned scalable infrastructure via Terraform (ASGs, ALBs, IAM).</li>
                <li>Automated pre-billing reports with Python (Boto3).</li>
                <li>Migrated legacy apps from AMD CentOS to ARM Amazon EC2 Linux.</li>
            </ul>
        `,
        education: `
            <p><strong>B.Tech Computer Science Engineering</strong> @ State University <span class="warning">(Sep 2018 - May 2022)</span></p>
            <p>Score: 83.4% - <span class="success">[VERIFIED]</span></p>
        `,
        socials: `
            <p>Currently Building in Public. Check out the latest deployments:</p>
            <p>🔗 <a href="#" style="color: var(--blue);">LinkedIn</a></p>
            <p>🔗 <a href="#" style="color: var(--blue);">Instagram (Building in Public Series)</a></p>
            <p>🔗 <a href="#" style="color: var(--blue);">YouTube (Stoic/Mindset Tech Content)</a></p>
        `,
        help: `
            <p>Available commands:</p>
            <ul style="list-style-type: none; padding-left: 0;">
                <li><span class="highlight">whoami</span>     - Display core profile and summary</li>
                <li><span class="highlight">skills</span>     - List technical competencies</li>
                <li><span class="highlight">experience</span> - Show employment history</li>
                <li><span class="highlight">education</span>  - Display academic background</li>
                <li><span class="highlight">socials</span>    - Links to online profiles and content</li>
                <li><span class="highlight">clear</span>      - Clear the terminal screen</li>
                <li><span class="highlight">sudo</span>       - Execute a command as superuser</li>
            </ul>
        `
    };

    // Command Parser
    inputField.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const rawCmd = this.value;
            const cmd = rawCmd.trim().toLowerCase();
            this.value = ''; // Clear input

            // Print the command that was typed
            const promptHTML = `
                <div class="output-line" style="margin-top: 15px;">
                    <span class="user">admin</span>@<span class="host">sre-prod-server</span>:<span class="path">~</span>$ ${rawCmd}
                </div>`;
            historyDiv.innerHTML += promptHTML;

            // Process Command
            let responseHTML = '';
            
            if (cmd === 'clear') {
                historyDiv.innerHTML = '';
                termBody.scrollTop = termBody.scrollHeight;
                return;
            } else if (resumeData[cmd]) {
                responseHTML = `<div class="output-line">${resumeData[cmd]}</div>`;
            } else if (cmd.startsWith('sudo ')) {
                responseHTML = `<div class="output-line"><span class="error">Permission denied:</span> user 'admin' is not in the sudoers file. This incident will be reported.</div>`;
            } else if (cmd === 'ping') {
                responseHTML = `<div class="output-line">PONG. Server is alive and building.</div>`;
            } else if (cmd === '') {
                responseHTML = ''; // Do nothing on empty enter
            } else {
                responseHTML = `<div class="output-line"><span class="error">bash: ${cmd}: command not found</span>. Type 'help' for available commands.</div>`;
            }

            // Append response and scroll down
            if (responseHTML) {
                historyDiv.innerHTML += responseHTML;
            }
            // Small timeout to ensure DOM update before scrolling
            setTimeout(() => {
                termBody.scrollTop = termBody.scrollHeight;
            }, 10);
        }
    });
</script>

</body>
</html>
